# ADD git cz

git:
  pagers:
    - colorArg: always
      pager: delta --paging=never --features="mellow-barbet" --syntax-theme="rose-pine"

gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#31748f"
      - bold

    inactiveBorderColor:
      - "#6e6a86"

    searchingActiveBorderColor:
      - "#ebbcba"
      - bold

    optionsTextColor:
      - "#9ccfd8"

    selectedLineBgColor:
      - "#31748f"

    inactiveViewSelectedLineBgColor:
      - "#26233a"
      - bold

    cherryPickedCommitFgColor:
      - "#1f1d2e"

    cherryPickedCommitBgColor:
      - "#ebbcba"

    markedBaseCommitFgColor:
      - "#9ccfd8"

    markedBaseCommitBgColor:
      - "#f6c177"

    unstagedChangesColor:
      - "#eb6f92"

    defaultFgColor:
      - "#e0def4"

# to exit immediately if run outside of the Git repository
notARepository: "quit"
